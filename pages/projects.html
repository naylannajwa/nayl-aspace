<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>nayl-aSpace · Projects</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 fill=%22%2300d4ff%22>✦</text></svg>">
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .hero-band {
      padding: calc(var(--nav-h)) -52px -50px;
      background: radial-gradient(ellipse at top, rgba(10, 47, 255, 0.12), transparent 70%);
      position: relative;
      z-index: 2
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 22px
    }

    .proj-card {
      background: var(--glass);
      border: 1px solid var(--glass-b);
      border-radius: var(--r-lg);
      overflow: hidden;
      cursor: pointer;
      transition: var(--trans);
    }

    .proj-card:hover {
      border-color: var(--glass-b-hi);
      box-shadow: 0 18px 64px rgba(0, 40, 200, .28);
      transform: translateY(-6px)
    }

    /* THUMB */
    .proj-thumb {
      height: 190px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .proj-thumb-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .proj-thumb-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--bg-mid), rgba(10, 47, 255, .35));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .proj-thumb-icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: rgba(10, 47, 255, .25);
      border: 1px solid rgba(78, 130, 255, .2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: var(--blue-3);
    }

    .proj-thumb-bg-lines {
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(30, 92, 255, .05) 28px, rgba(30, 92, 255, .05) 29px),
        repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(30, 92, 255, .04) 28px, rgba(30, 92, 255, .04) 29px);
    }

    .proj-thumb-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0, 212, 255, .1), transparent 70%)
    }

    .proj-status-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 10px;
      backdrop-filter: blur(8px);
      border-radius: var(--r-pill);
      font-family: var(--f-mono);
      font-size: .62rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .proj-status-badge i {
      font-size: .62rem
    }

    .badge-done {
      background: rgba(74, 222, 128, .12);
      border: 1px solid rgba(74, 222, 128, .22);
      color: #4ade80
    }

    .badge-wip {
      background: rgba(251, 191, 36, .1);
      border: 1px solid rgba(251, 191, 36, .22);
      color: var(--warn)
    }

    .badge-paused {
      background: rgba(148, 163, 184, .1);
      border: 1px solid rgba(148, 163, 184, .18);
      color: rgba(148, 163, 184, .8)
    }

    /* img count badge */
    .img-count-badge {
      position: absolute;
      bottom: 10px;
      left: 10px;
      padding: 3px 9px;
      background: rgba(5, 15, 50, .85);
      border: 1px solid var(--glass-b);
      border-radius: var(--r-pill);
      font-family: var(--f-mono);
      font-size: .62rem;
      color: var(--white-dim);
      display: flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(8px);
    }

    .proj-body {
      padding: 22px
    }

    .proj-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 12px
    }

    .proj-name {
      font-family: var(--f-display);
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px
    }

    .proj-desc {
      font-size: .84rem;
      color: var(--white-dim);
      line-height: 1.65;
      margin-bottom: 18px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden
    }

    .proj-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap
    }

    .plink {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--f-mono);
      font-size: .7rem;
      color: var(--cyan);
      text-decoration: none;
      transition: opacity .2s;
    }

    .plink:hover {
      opacity: .7
    }

    .plink i {
      font-size: .72rem
    }

    /* PROJECT MODAL (detail view) */
    .proj-detail-imgs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .proj-detail-img {
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/9;
      border: 1px solid var(--glass-b);
      cursor: pointer;
      transition: var(--trans);
    }

    .proj-detail-img:hover {
      border-color: var(--glass-b-hi);
      transform: scale(1.02)
    }

    .proj-detail-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: var(--white-dim);
      font-family: var(--f-mono);
      font-size: .85rem
    }

    .empty-icon {
      font-size: 2.5rem;
      color: rgba(78, 130, 255, .25);
      margin-bottom: 14px
    }

    /* LIGHTBOX */
    #lightbox {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(2, 8, 24, .95);
      backdrop-filter: blur(16px);
      display: none;
      align-items: center;
      justify-content: center;
    }

    #lightbox.open {
      display: flex
    }

    #lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      border-radius: 12px;
      object-fit: contain
    }

    #lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer
    }

    .modal-box {
      width: 95%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px
    }

    .modal-close {
      top: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    /* MOBILE NAV & RESPONSIVE */
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--cyan);
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 1001
    }

    @media(max-width:768px) {
      .hero-band {
        padding: 0px 22px 0px
      }
    }

    @media(max-width:768px) {
      .nav-right {
        display: none
      }

      /* Project Specific Mobile */
      .proj-detail-imgs {
        grid-template-columns: 1fr
      }

      .modal-title {
        font-size: 1.4rem
      }
    }
  </style>
</head>

<body>

  <div id="cursor-ring"></div>
  <canvas id="bg-canvas"></canvas>

  <nav id="user-nav">
    <a class="nav-logo" href="../index.html">nayl-aSpace</a>
    <button class="nav-toggle" id="nav-toggle"><i class="fa-solid fa-bars"></i></button>
    <ul class="nav-links" id="nav-links">
      <li><a href="../index.html"><i class="fa-solid fa-house"></i>Home</a></li>
      <li><a href="projects.html"><i class="fa-solid fa-rocket"></i>Projects</a></li>

  <div class="page-content">
    <div class="section-wrap">
      <p class="section-label reveal"><i class="fa-solid fa-rocket"></i>My Projects</p>
      <h1 class="section-title reveal"><span class="grad">Things I've Built</span></h1>
      <div class="search-box reveal">
        <input type="text" class="search-input" id="search-input" placeholder="Search projects..."

        <button class="filter-btn" onclick="filterProj('web',this)"><i class="fa-solid fa-globe"></i>Web<span
            class="cat-count" id="c-web">0</span></button>
        <button class="filter-btn" onclick="filterProj('mobile',this)"><i
            class="fa-solid fa-mobile-screen"></i>Mobile<span class="cat-count" id="c-mobile">0</span></button>
        <button class="filter-btn" onclick="filterProj('game',this)"><i class="fa-solid fa-gamepad"></i>Game<span
            class="cat-count" id="c-game">0</span></button>
        <button class="filter-btn" onclick="filterProj('design',this)"><i class="fa-solid fa-pen-ruler"></i>Design<span
            class="cat-count" id="c-design">0</span></button>
        <button class="filter-btn" onclick="filterProj('ai',this)"><i class="fa-solid fa-robot"></i>AI<span

      </div>
      <div class="projects-grid reveal" id="projects-grid"></div>

  <!-- PROJECT DETAIL MODAL -->
  <div class="modal-overlay" id="proj-modal"
    onclick="if(event.target===this){this.classList.remove('open');document.body.style.overflow='';}">
    <div class="modal-box" style="max-width:780px">
      <div id="proj-modal-content"></div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" onclick="this.classList.remove('open')">
    <button id="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('open')"><i
        class="fa-solid fa-xmark"></i></button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <footer>
    <p>crafted with <span class="accent">✦</span> by <span class="accent">nayl-aSpace</span></p>
  </footer>
  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/script.js"></script>
  <script>
    const DEFAULT_PROJECTS = [
      { id: 'd1', name: 'Portfolio Website', description: '<h2>Overview</h2><p>This portfolio site — glassmorphism dark-blue aesthetic built with vanilla HTML/CSS/JS + Supabase backend.</p><ul><li>Interactive particle canvas</li><li>Custom cursor</li><li>Admin CRUD panel</li></ul>', tags: ['HTML', 'CSS', 'JS', 'Supabase'], icon: 'fa-solid fa-globe', category: 'web', status: 'completed', github_url: '', live_url: '', images: [] },
      { id: 'd2', name: 'Unity 2D Game', description: '<h2>Overview</h2><p>Side-scroller built in Unity with C#. Features procedural level generation and custom enemy AI.</p>', tags: ['Unity', 'C#', 'Game Dev'], icon: 'fa-solid fa-gamepad', category: 'game', status: 'completed', github_url: '', live_url: '', images: [] },
      { id: 'd3', name: 'Android App', description: '<h2>Overview</h2><p>Mobile app in Kotlin with MVVM architecture, Room database, clean UI.</p>', tags: ['Kotlin', 'Android', 'SQL'], icon: 'fa-brands fa-android', category: 'mobile', status: 'wip', github_url: '', live_url: '', images: [] },
      { id: 'd4', name: 'AI Dashboard', description: '<h2>Overview</h2><p>React dashboard integrating multiple AI APIs. Real-time visualization with D3.js.</p>', tags: ['React', 'AI', 'Next.js'], icon: 'fa-solid fa-robot', category: 'ai', status: 'completed', github_url: '', live_url: '', images: [] },
      { id: 'd5', name: 'UI/UX Case Study', description: '<h2>Overview</h2><p>Full product design case study — research, wireframes, prototypes in Figma.</p>', tags: ['Figma', 'UI/UX', 'Design'], icon: 'fa-solid fa-pen-ruler', category: 'design', status: 'completed', github_url: '', live_url: '', images: [] },
    ];

    let allProjects = [], currentFilter = 'all';

    const STATUS_MAP = {
      completed: { label: 'Completed', icon: 'fa-circle-check', cls: 'badge-done' },
      wip: { label: 'In Progress', icon: 'fa-circle-half-stroke', cls: 'badge-wip' },
      paused: { label: 'Paused', icon: 'fa-circle-pause', cls: 'badge-paused' },
    };

    function getIcon(icon) {
      if (!icon) return `<i class="fa-solid fa-rocket"></i>`;
      if (icon.startsWith('fa-') || icon.startsWith('fas ') || icon.startsWith('fab ')) return `<i class="${icon}"></i>`;
      return icon; // emoji fallback
    }

    function renderThumb(p) {
      const imgs = p.images || [];
      if (imgs.length) {
        return `<div class="proj-thumb">
      <img class="proj-thumb-img" src="${imgs[0]}" alt="${p.name}" loading="lazy">
      ${imgs.length > 1 ? `<div class="img-count-badge"><i class="fa-solid fa-images"></i>${imgs.length} photos</div>` : ''}
      ${renderStatus(p)}
    </div>`;
      }
      return `<div class="proj-thumb">
    <div class="proj-thumb-placeholder">
      <div class="proj-thumb-bg-lines"></div>
      <div class="proj-thumb-glow"></div>
      <div class="proj-thumb-icon-wrap">${getIcon(p.icon)}</div>
    </div>
    ${renderStatus(p)}
  </div>`;
    }

    function renderStatus(p) {
      const s = STATUS_MAP[p.status] || STATUS_MAP.completed;
      return `<div class="proj-status-badge ${s.cls}"><i class="fa-solid ${s.icon}"></i>${s.label}</div>`;
    }

    function renderProjects() {
      const grid = document.getElementById('projects-grid');
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      const f = currentFilter;

      const shown = allProjects.filter(p => {
        const matchesFilter = f === 'all' || (p.category || '').includes(f) || (p.tags || []).some(t => t.toLowerCase().includes(f));
        const matchesSearch = !query || p.name.toLowerCase().includes(query) || (p.tags || []).some(t => t.toLowerCase().includes(query));
        return matchesFilter && matchesSearch;
      });

      if (!shown.length) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fa-solid fa-magnifying-glass"></i></div>No projects found.</div>`;
        return;
      }
      grid.innerHTML = shown.map(p => `
    <div class="proj-card reveal" onclick="openProjModal('${p.id}')">
      ${renderThumb(p)}
      <div class="proj-body">
        <div class="proj-tags">${(p.tags || []).map(t => `<span class="pill">${t}</span>`).join('')}</div>
        <div class="proj-name">${p.name}</div>
        <div class="proj-desc rich-content">${p.description || ''}</div>
        <div class="proj-links">
          ${p.github_url ? `<a class="plink" href="${p.github_url}" target="_blank" onclick="event.stopPropagation()"><i class="fa-brands fa-github"></i>GitHub</a>` : ''}
          ${p.live_url ? `<a class="plink" href="${p.live_url}" target="_blank" onclick="event.stopPropagation()"><i class="fa-solid fa-arrow-up-right-from-square"></i>Live</a>` : ''}
        </div>
      </div>
    </div>
  `).join('');
      initReveal();
    }

    function openProjModal(id) {
      const p = allProjects.find(x => x.id === id);
      if (!p) return;
      const s = STATUS_MAP[p.status] || STATUS_MAP.completed;
      const imgs = p.images || [];

      // Main image for story background (first image or placeholder logic)
      const bgImg = imgs.length ? imgs[0] : '';
      const otherImgs = imgs;

      // Collect all links to unified array for uniform grid layout
      const links = [];
      if (p.live_url) links.push({ url: p.live_url, icon: 'fa-solid fa-arrow-up-right-from-square', label: 'View Live', cls: 'pm-btn-primary' });
      if (p.github_url) links.push({ url: p.github_url, icon: 'fa-brands fa-github', label: 'Source Code', cls: 'pm-btn-ghost' });
      if (p.extra_links) p.extra_links.forEach(l => links.push({ url: l.url, icon: l.icon, label: l.label, cls: 'pm-btn-ghost' }));

      document.getElementById('proj-modal-content').innerHTML = `
    <!-- Content -->
    <div class="story-content">
      <!-- Desktop Cover (Tetap ada tapi hidden via CSS di mobile) -->
      ${bgImg ? `<div class="proj-cover-desktop"><img src="${bgImg}" alt="Cover"></div>` : ''}
      
      <div style="margin-bottom:12px">
        <div class="modal-title" style="margin-bottom:6px"><span class="grad">${p.name}</span></div>
        <div style="font-family:var(--f-mono);font-size:0.75rem;color:var(--white-dim);display:flex;align-items:center;gap:8px">
           <span class="proj-status-badge ${s.cls}" style="position:static;display:inline-flex"><i class="fa-solid ${s.icon}"></i>${s.label}</span>
           <span>—</span>
           <span>${p.category || 'Project'}</span>
        </div>
      </div>

      <div class="pm-layout">
        
        <!-- LEFT: MAIN CONTENT -->
        <div class="pm-main" style="width:100%">
           <!-- ACTIONS (Uniform Grid Layout) -->
           <div class="pm-actions" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(145px, 1fr)); gap:12px; margin-bottom:28px; width:100%">
             ${links.map(l => `
               <a href="${l.url}" target="_blank" class="pm-btn ${l.cls}" style="width:100%; justify-content:center; text-align:center">
                 <i class="${l.icon}"></i>${l.label}
               </a>
             `).join('')}
           </div>

           <!-- TECH STACK (With Label) -->
           <div style="margin-bottom:28px">
             <div class="pm-group-lbl"><i class="fa-solid fa-microchip"></i>Tech Stack</div>
             <div class="pm-tags">
               ${(p.tags || []).map(t => `<span class="pm-tag">${t}</span>`).join('')}
             </div>
           </div>

           <div class="pm-group-lbl"><i class="fa-solid fa-align-left"></i>Overview</div>
           <div class="rich-content" style="margin-bottom:32px">${p.description || '<p>No description available.</p>'}</div>

           ${otherImgs.length ? `
             <div class="pm-group-lbl"><i class="fa-solid fa-images"></i>Gallery</div>
             <div class="proj-detail-imgs">
               ${otherImgs.map(url => `<div class="proj-detail-img" onclick="openLightbox('${url}')"><img src="${url}" alt="${p.name}" loading="lazy"></div>`).join('')}
             </div>
           `: ''}
        </div>
      </div>
    </div>
  `;

      const mb = document.querySelector('.modal-box');
      mb.style.transform = ''; // Hapus transform inline sebelumnya
      mb.classList.remove('sheet-full');
      mb.classList.add('sheet-half');

      document.getElementById('proj-modal').classList.add('open');
      document.body.style.overflow = 'hidden';

      // FIX: Inisialisasi swipe SETELAH konten dibuat
      initSheetGestures();
    }

    function initSheetGestures() {
      const modal = document.getElementById('proj-modal');
      const content = document.querySelector('.story-content'); // Elemen baru
      const box = document.querySelector('.modal-box');
      if (!content || !modal || !box) return;

      // HAPUS BLOCKING: Kita perlu pasang listener baru setiap kali modal dibuka
      // karena elemen '.story-content' selalu dibuat ulang.

      let startY = 0, currentY = 0, isDragging = false, startTranslateY = 0;
      let sheetState = 'half';

      // 1. Touch Start
      const onTouchStart = (e) => {
        if (content.scrollTop > 0) { isDragging = false; return; }

        isDragging = true;
        startY = e.touches[0].clientY;
        sheetState = box.classList.contains('sheet-full') ? 'full' : 'half';

        const style = window.getComputedStyle(box);
        const matrix = new WebKitCSSMatrix(style.transform);
        startTranslateY = matrix.m42;

        box.style.transition = 'none';
      };

      // 2. Touch Move
      const onTouchMove = (e) => {
        if (!isDragging) return;

        currentY = e.touches[0].clientY;
        const delta = currentY - startY;

        if (sheetState === 'full' && delta < 0) return;

        if (e.cancelable) e.preventDefault();

        let newY = startTranslateY + delta;
        if (newY < 0) newY *= 0.3; // Efek tahanan saat ditarik ke atas

        box.style.transform = `translateY(${newY}px)`;
      };

      // 3. Touch End
      const onTouchEnd = (e) => {
        if (!isDragging) return;
        isDragging = false;
        box.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';

        const delta = currentY - startY;

        if (sheetState === 'half') {
          if (delta < -80) snapTo('full');
          else if (delta > 100) closeModal();
          else snapTo('half');
        } else { // 'full' state
          if (delta > 120) snapTo('half');
          else snapTo('full');
        }
      };

      const snapTo = (state) => {
        box.style.transform = '';
        if (state === 'full') {
          box.classList.remove('sheet-half');
          box.classList.add('sheet-full');
        } else {
          box.classList.remove('sheet-full');
          box.classList.add('sheet-half');
        }
      };

      const closeModal = () => {
        if (navigator.vibrate) navigator.vibrate(50);
        modal.classList.remove('open');
        document.body.style.overflow = '';
      };

      content.addEventListener('touchstart', onTouchStart, { passive: true });
      content.addEventListener('touchmove', onTouchMove, { passive: false });
      content.addEventListener('touchend', onTouchEnd);
    }



    /*document.addEventListener('DOMContentLoaded', () => {
    });*/


    function openLightbox(url) {
      document.getElementById('lightbox-img').src = url;
      document.getElementById('lightbox').classList.add('open');
    }

    function filterProj(cat, btn) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProjects();
    }

    async function loadProjects() {
      const data = await DB.get('projects'); // Gunakan DB.get agar ambil dari Supabase
      allProjects = data.length ? data : DEFAULT_PROJECTS;

      // Update Counts
      document.getElementById('c-all').textContent = allProjects.length;
      ['web', 'mobile', 'game', 'design', 'ai'].forEach(c => {
        const count = allProjects.filter(p => (p.category || '').includes(c) || (p.tags || []).some(t => t.toLowerCase().includes(c))).length;
        const el = document.getElementById('c-' + c);
        if (el) el.textContent = count;
      });

      renderProjects();
    }

    // Tunggu sampai Supabase siap (initSB di script.js jalan saat DOMContentLoaded)
    document.addEventListener('DOMContentLoaded', () => {
      loadProjects();
    });
  </script>
</body>

</html>
