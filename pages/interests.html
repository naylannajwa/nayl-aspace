<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 fill=%22%2300d4ff%22>✦</text></svg>">
<link rel="stylesheet" href="../assets/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.hero-band{padding:calc(var(--nav-h)-50px) -52px -44px;background:radial-gradient(ellipse at top, rgba(10,47,255,0.12), transparent 70%);position:relative;z-index:2}

/* L1: CATEGORY TABS */
.cat-tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:44px}
.cat-tab{
  display:flex;align-items:center;gap:9px;
  padding:11px 22px;
  background:var(--glass);border:1px solid var(--glass-b);
  border-radius:var(--r-pill);
  color:var(--white-dim);font-family:var(--f-display);font-size:.9rem;font-weight:600;
  cursor:pointer;transition:var(--trans);
}
.cat-tab i{font-size:.9rem}
.cat-tab:hover{border-color:var(--blue-2);color:var(--white)}
.cat-tab.active{
  background:linear-gradient(135deg,var(--blue-0),var(--blue-2));
  border-color:transparent;color:#fff;box-shadow:0 4px 22px var(--glow-blue);
}
.cat-count{
  padding:2px 8px;background:rgba(255,255,255,.14);
  border-radius:var(--r-pill);font-family:var(--f-mono);font-size:.62rem;
}
.cat-panel{display:none}
.cat-panel.active{display:block;animation:fadeUp .4s ease both}

/* L2: TITLE CARD GRID */
.titles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:18px}
.title-card{
  background:var(--glass);border:1px solid var(--glass-b);
  border-radius:var(--r-lg);overflow:hidden;
  cursor:pointer;transition:var(--trans);position:relative;
}
.title-card:hover{border-color:var(--glass-b-hi);box-shadow:0 14px 48px rgba(0,40,200,.28);transform:translateY(-5px) scale(1.02)}
.tc-thumb{
  height:155px;
  background:linear-gradient(135deg,var(--bg-mid),rgba(10,47,255,.38));
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.tc-thumb-bg{
  position:absolute;inset:0;
  background-image:repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(30,92,255,.04) 18px,rgba(30,92,255,.04) 19px);
}
.tc-thumb-glow{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,212,255,.1),transparent 70%)}
.tc-icon{
  position:relative;z-index:1;
  width:64px;height:64px;border-radius:18px;
  background:rgba(10,47,255,.25);border:1px solid rgba(78,130,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;color:var(--blue-3);
  transition:var(--trans);
}
.title-card:hover .tc-icon{background:rgba(10,47,255,.4);border-color:rgba(0,212,255,.3);color:var(--cyan)}
.tc-badge{
  position:absolute;top:10px;right:10px;z-index:2;
  padding:3px 9px;background:rgba(5,15,50,.8);border:1px solid var(--glass-b);
  border-radius:var(--r-pill);font-family:var(--f-mono);font-size:.6rem;color:var(--cyan);
  backdrop-filter:blur(8px);display:flex;align-items:center;gap:4px;
}
.tc-badge i{font-size:.6rem}
.tc-body{padding:14px}
.tc-title{font-family:var(--f-display);font-size:.92rem;font-weight:700;margin-bottom:4px;line-height:1.3}
.tc-meta{font-family:var(--f-mono);font-size:.66rem;color:var(--blue-3)}

/* L3: DETAIL VIEW */
#detail-view{display:none}
#detail-view.open{display:block;animation:fadeUp .35s ease both}
.detail-back{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 18px;background:var(--glass);border:1px solid var(--glass-b);
  border-radius:var(--r-pill);color:var(--white-dim);
  font-family:var(--f-mono);font-size:.72rem;cursor:pointer;transition:var(--trans);
  margin-bottom:28px;
}
.detail-back:hover{border-color:var(--cyan);color:var(--cyan)}
.detail-layout{display:grid;grid-template-columns:300px 1fr;gap:36px;align-items:start}
.detail-cover{
  aspect-ratio:3/4;max-height:400px;
  background:linear-gradient(135deg,var(--bg-mid),rgba(10,47,255,.45));
  border-radius:var(--r-lg);border:1px solid var(--glass-b);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.detail-cover-bg{position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(30,92,255,.05) 20px,rgba(30,92,255,.05) 21px)}
.detail-cover-glow{position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(transparent,rgba(4,10,40,.85))}
.detail-cover-icon{
  position:relative;z-index:1;
  width:90px;height:90px;border-radius:24px;
  background:rgba(10,47,255,.28);border:1px solid rgba(78,130,255,.22);
  display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;color:var(--blue-3);
  animation:glow 3s ease-in-out infinite;
}
.detail-cover-imgs{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.detail-cover-img{
  width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;
  border:1px solid var(--glass-b);cursor:pointer;transition:var(--trans);
}
.detail-cover-img:hover{border-color:var(--glass-b-hi);transform:scale(1.02)}
.detail-cover-img img{width:100%;height:100%;object-fit:cover}

.detail-title{font-family:var(--f-display);font-size:clamp(1.6rem,3vw,2.3rem);font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.detail-title .grad{background:linear-gradient(135deg,#fff,var(--blue-3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.detail-meta-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.meta-item{font-family:var(--f-mono);font-size:.7rem;color:var(--white-dim);display:flex;align-items:center;gap:5px}
.meta-item i{font-size:.68rem;color:var(--blue-3)}
.meta-sep{color:rgba(140,180,255,.25)}
.stars{display:flex;gap:2px}
.stars i{font-size:.88rem}
.star-full{color:#fbbf24}.star-empty{color:rgba(251,191,36,.2)}

.detail-pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:24px}

/* FEEL SECTION */
.feel-box{
  padding:22px 24px;
  background:var(--glass);border:1px solid var(--glass-b);
  border-radius:var(--r);margin-bottom:22px;
  position:relative;overflow:hidden;
}
.feel-box::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--cyan),var(--blue-2))}
.feel-label{
  font-family:var(--f-mono);font-size:.67rem;letter-spacing:.15em;text-transform:uppercase;
  color:var(--cyan);margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.feel-label i{font-size:.7rem}
.feel-text{font-size:.92rem;color:var(--white-dim);line-height:1.82;font-style:italic}
.feel-qmark{font-family:var(--f-display);font-size:3.5rem;color:rgba(0,212,255,.1);line-height:.5;float:left;margin-right:8px;margin-top:10px}

/* MOMENTS */
.moments-wrap{margin-bottom:22px}
.moments-title{font-family:var(--f-mono);font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--white-dim);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.moments-title i{font-size:.7rem;color:var(--blue-3)}
.moment-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--glass-b)}
.moment-row:last-child{border-bottom:none}
.moment-num{font-family:var(--f-mono);font-size:.66rem;color:var(--cyan);width:22px;flex-shrink:0;padding-top:2px}
.moment-txt{font-size:.84rem;color:var(--white-dim);line-height:1.65}
.moment-txt strong{color:var(--white);font-weight:600}

/* GALLERY GRID */
.gallery-wrap{margin-top:28px}
.gallery-label{font-family:var(--f-mono);font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--white-dim);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.gallery-label i{font-size:.7rem;color:var(--blue-3)}
.gallery-imgs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.gallery-cell{
  aspect-ratio:1;border-radius:10px;overflow:hidden;
  background:linear-gradient(135deg,var(--bg-mid),rgba(10,47,255,.3));
  border:1px solid var(--glass-b);cursor:pointer;transition:var(--trans);
  display:flex;align-items:center;justify-content:center;
  font-size:1.9rem;color:var(--blue-3);position:relative;
}
.gallery-cell img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.gallery-cell:hover{border-color:var(--glass-b-hi);transform:scale(1.04)}
.gallery-cell-lbl{
  position:absolute;bottom:0;left:0;right:0;
  padding:5px;background:linear-gradient(transparent,rgba(4,10,40,.9));
  font-family:var(--f-mono);font-size:.58rem;color:var(--white-dim);
  text-align:center;opacity:0;transition:opacity .2s;
}
.gallery-cell:hover .gallery-cell-lbl{opacity:1}

/* LIGHTBOX */
#lb{position:fixed;inset:0;z-index:999;background:rgba(2,8,24,.95);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center}
#lb.open{display:flex;animation:fadeIn .2s ease}
#lb img{max-width:90vw;max-height:88vh;border-radius:12px;object-fit:contain}
#lb-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:50%;width:40px;height:40px;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--trans)}
#lb-close:hover{background:rgba(255,255,255,.2)}

/* MOBILE NAV & RESPONSIVE */
.nav-toggle{display:none;background:none;border:none;color:var(--cyan);font-size:1.5rem;cursor:pointer;z-index:1001}

@media(max-width:900px){.detail-layout{grid-template-columns:1fr}} 
@media(max-width:768px){
  .hero-band{padding:100px 22px 40px}
  .gallery-imgs-grid{grid-template-columns:repeat(2,1fr)}
  .nav-right{display:none}
  
  /* Interests Specific */
  .cat-tabs{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap;padding-bottom:10px}
  .cat-tab{flex-shrink:0}
  .detail-title{font-size:1.8rem}
  .detail-cover{max-height:300px}
}
</style>
</head>

<script>
// ── DATA ───────────────────────────────────────────────────────────────────
const CATS = {
  anime:  { label:'Anime',   icon:'fa-solid fa-sword',    faIcon:'<i class="fa-solid fa-user-ninja"></i>' },
  manhwa: { label:'Manhwa',  icon:'fa-solid fa-book-open', faIcon:'<i class="fa-solid fa-book-open"></i>' },
  movies: { label:'Movies',  icon:'fa-solid fa-film',      faIcon:'<i class="fa-solid fa-film"></i>' },
  misc:   { label:'Misc',    icon:'fa-solid fa-star',      faIcon:'<i class="fa-solid fa-star"></i>' },
};

const DATA = {
  anime:[
    {id:'aot',title:'Attack on Titan',icon:'fa-solid fa-shield',meta:'2013–2023 · Isayama',rating:5,genre:'Dark Fantasy',badges:['Masterpiece','Dark'],
     feel:`Reading AoT hit me like a truck I didn't see coming. The moment the walls fell, something shifted — this wasn't action for action's sake, it was a statement about freedom, sacrifice, and the brutal cost of both. I finished this series feeling genuinely conflicted about every character. Eren's arc destroyed me in the best possible way. Hiroyuki Sawano's score became the permanent OST of my late-night coding sessions.`,
     moments:[{t:'The Wall Break',d:'Pure shock and dread. The tone was set instantly and irrevocably.'},{t:'Levi vs Beast Titan',d:'The most beautifully animated 90 seconds in anime history. Still get chills.'},{t:'Eren\'s basement reveal',d:'The entire world flipping upside down. Had to pause and just sit with it.'},{t:'Final arc',d:'Bold, necessary, tragic. It earned every controversial beat.'}],
     gallery:[{icon:'fa-solid fa-shield',lbl:'Survey Corps'},{icon:'fa-solid fa-bolt',lbl:'Titan Shift'},{icon:'fa-solid fa-mountain-sun',lbl:'Paradis'},{icon:'fa-solid fa-sword',lbl:'Levi'},{icon:'fa-solid fa-water',lbl:'Rumbling'},{icon:'fa-solid fa-masks-theater',lbl:'Eren Choice'}],images:[]},

    {id:'sg',title:'Steins;Gate',icon:'fa-solid fa-flask',meta:'2011 · 5pb./White Fox',rating:5,genre:'Sci-Fi Thriller',badges:['Mind-bending','Emotional'],
     feel:`Steins;Gate is the only piece of media that made me feel like a programmer while watching it. The logic of time loops, the weight of every choice, the dread of knowing what has to happen. Okabe Rintaro is one of the best written protagonists ever. And Mayuri's fate... I actually teared up. This is what fiction should do — make the impossible feel real and consequential.`,
     moments:[{t:'The convergence reveal',d:'When you realize the story was always heading exactly here. Masterful.'},{t:'Okabe carrying the burden',d:'Watching him break and rebuild across timelines is devastating.'},{t:'The 1% divergence',d:'That final episode had me emotionally compromised for days.'},{t:'Mayuri humming',d:'Simple, haunting detail throughout. Perfect foreshadowing.'}],
     gallery:[{icon:'fa-solid fa-flask',lbl:'Future Gadget Lab'},{icon:'fa-solid fa-clock-rotate-left',lbl:'Time Leap'},{icon:'fa-solid fa-mobile-screen',lbl:'Phone Microwave'},{icon:'fa-solid fa-infinity',lbl:'Divergence'},{icon:'fa-solid fa-masks-theater',lbl:'Okabe'},{icon:'fa-solid fa-moon',lbl:'Akihabara Nights'}],images:[]},

    {id:'hxh',title:'Hunter x Hunter',icon:'fa-solid fa-sparkles',meta:'2011 · Togashi / Madhouse',rating:5,genre:'Action/Psychological',badges:['Masterpiece','Subversive'],
     feel:`HxH consistently subverts every shonen trope it sets up — that's what makes it transcendent. Gon is a protagonist who's genuinely terrifying under the surface. Killua's arc is the emotional core. The Chimera Ant arc is the longest, strangest, most philosophical thing I've watched in animation — and somehow it's the best arc. Togashi writing commentary on death, evolution, and humanity through giant ants? Unhinged genius.`,
     moments:[{t:'Gon vs Pitou',d:'The most harrowing "hero" moment I\'ve witnessed. Broken in the best way.'},{t:'Killua and Alluka',d:'What the whole series built emotionally. Perfect.'},{t:'Nen system reveal',d:'The most thoughtfully designed power system in all of shonen.'},{t:'Meruem and Komugi',d:'Playing gungi. I cried. That\'s all.'}],
     gallery:[{icon:'fa-solid fa-bolt',lbl:'Killua Lightning'},{icon:'fa-solid fa-fire',lbl:'Nen Aura'},{icon:'fa-solid fa-handshake',lbl:'Gon & Killua'},{icon:'fa-solid fa-bug',lbl:'Chimera Ant'},{icon:'fa-solid fa-playing-card',lbl:'Hisoka'},{icon:'fa-solid fa-leaf',lbl:'Heavens Arena'}],images:[]},
  ],

  manhwa:[
    {id:'sl',title:'Solo Leveling',icon:'fa-solid fa-crown',meta:'2018–2021 · Chugong/Dubu',rating:5,genre:'Action/Fantasy',badges:['Power Fantasy','Iconic'],
     feel:`Solo Leveling is the manhwa that brought the medium mainstream, and for good reason. Jinwoo's progression from absolute weakest to walking god is genuinely satisfying because Chugong makes you feel every milestone. The art by Dubu is cinematic — full color, perfect framing, action sequences that feel like film storyboards. Read it in one weekend sitting. Zero regrets, ruined sleep schedule.`,
     moments:[{t:'Shadow Extraction',d:'First time he raises his shadows. The panel composition is iconic.'},{t:'Beru summon',d:'When the top-floor boss starts answering to him. Chills.'},{t:'Jinwoo vs Igris',d:'The fight that establishes everything. Perfectly paced tension.'},{t:'Final arc',d:'Global scale, absolutely insane power ceiling — but it earns every bit.'}],
     gallery:[{icon:'fa-solid fa-crown',lbl:'Shadow Monarch'},{icon:'fa-solid fa-dungeon',lbl:'S-Rank Gate'},{icon:'fa-solid fa-ghost',lbl:'Shadow Army'},{icon:'fa-solid fa-sword',lbl:'vs Igris'},{icon:'fa-solid fa-bolt',lbl:'Arise'},{icon:'fa-solid fa-circle',lbl:'Dungeon'}],images:[]},

    {id:'orv',title:'Omniscient Reader',icon:'fa-solid fa-book',meta:'2020– · sing N song/UMI',rating:5,genre:'Meta Fantasy',badges:['Meta','Emotional'],
     feel:`ORV is something I was not prepared for. It starts as meta-fiction about a reader who knows every plot beat of a novel, then slowly destroys you emotionally because Kim Dokja's whole thing is that he's spent his life knowing how stories go but never being the protagonist. The climax reveals made me stare at the ceiling. Dokja and Joongkil's dynamic is the best in all of manhwa, full stop.`,
     moments:[{t:'Dokja as the only reader',d:'The premise hits hard once you understand what his isolation means.'},{t:'Joongkil catching up',d:'The scene that broke every reader. Absolutely devastating.'},{t:'Star Stream reveals',d:'The cosmological lore is insane — in the best way.'},{t:'The final read',d:'Everything paying off. I was a mess.'}],
     gallery:[{icon:'fa-solid fa-book',lbl:'The Novel'},{icon:'fa-solid fa-star',lbl:'Star Stream'},{icon:'fa-solid fa-bolt',lbl:'Dokja Awakens'},{icon:'fa-solid fa-masks-theater',lbl:'Kim Dokja'},{icon:'fa-solid fa-scroll',lbl:'Scenarios'},{icon:'fa-solid fa-moon',lbl:'Grimdark Earth'}],images:[]},
  ],

  movies:[
    {id:'interstellar',title:'Interstellar',icon:'fa-solid fa-planet-ringed',meta:'2014 · Christopher Nolan',rating:5,genre:'Sci-Fi Drama',badges:['Emotional','Mind-bending'],
     feel:`Interstellar hit me at exactly the right moment — deep in physics and astronomy rabbit holes. The science is ambitious enough to feel real, and the emotional core (a father separated from his daughter by time) is devastating. Hans Zimmer's score isn't a soundtrack, it's a co-author. The docking scene with No Time for Caution playing is the most technically and emotionally intense 4 minutes in cinema. I sat in my car for 20 minutes after the theater.`,
     moments:[{t:'The docking scene',d:'Tense, physical, impossibly good. Hans Zimmer carrying everything.'},{t:'The water planet',d:'One hour equals seven years. Time made physical and brutal.'},{t:'Tesseract library',d:'Love transcending dimension. Absurd concept that somehow fully lands.'},{t:'Murphy\'s equation',d:'The perfect payoff to everything the film set up.'}],
     gallery:[{icon:'fa-solid fa-circle-nodes',lbl:'Gargantua'},{icon:'fa-solid fa-rocket',lbl:'Endurance'},{icon:'fa-solid fa-water',lbl:'Water Planet'},{icon:'fa-solid fa-book',lbl:'Bookshelf'},{icon:'fa-solid fa-ring-planet',lbl:'Saturn'},{icon:'fa-solid fa-clock',lbl:'Time Dilation'}],images:[]},

    {id:'exmachina',title:'Ex Machina',icon:'fa-solid fa-robot',meta:'2014 · Alex Garland',rating:5,genre:'Sci-Fi Thriller',badges:['Unsettling','Brilliant'],
     feel:`Ex Machina as a developer who works with AI is genuinely uncomfortable — and that's exactly why I love it. Garland's script is a Turing test conducted on the audience. By the end you're not sure who was being manipulated. Alicia Vikander's Ava is the best AI portrayal in film history. The final sequence destroyed me. This film made me think deeply about anthropomorphization, consciousness, and the ethics of creating intelligence. Required viewing if you code.`,
     moments:[{t:'Ava\'s first interview',d:'The wrongness is immediate and perfectly calibrated.'},{t:'Oscar Isaac dancing',d:'Bizarre, funny, deeply unsettling. Perfect tonal pivot.'},{t:'The mirror scene',d:'Body horror through implication alone.'},{t:'The ending',d:'The only ending the story could have. Brutal and correct.'}],
     gallery:[{icon:'fa-solid fa-robot',lbl:'Ava'},{icon:'fa-solid fa-house',lbl:'Facility'},{icon:'fa-solid fa-computer',lbl:'Turing Test'},{icon:'fa-solid fa-mirror',lbl:'Mirror'},{icon:'fa-solid fa-key',lbl:'Escape'},{icon:'fa-solid fa-tree',lbl:'Forest End'}],images:[]},
  ],

  misc:[
    {id:'gamedev',title:'Game Development',icon:'fa-solid fa-gamepad',meta:'Unity · C# · Design',rating:5,genre:'Creative Tech',badges:['Passion','Creating'],
     feel:`Game dev is what first got me into programming, and it still feels the most magical. You're creating an entire reality — you decide the physics, the rules, the aesthetics, the narrative. Unity and C# clicked for me in a way that felt like the code was storytelling. Every system I build (enemy AI, procedural levels, dialogue trees) is just world-building through logic. I enjoy the pain of debugging physics colliders at 2am. Character development fr.`,
     moments:[{t:'First enemy AI',d:'When the enemy actually tracked the player. Felt like I created life.'},{t:'Procedural terrain',d:'Perlin noise generating infinite worlds. The math is beautiful.'},{t:'First game jam entry',d:'Shipped something in 48 hours. Changed how I see deadlines forever.'},{t:'First custom shader',d:'When visual art and code fully merged in my head.'}],
     gallery:[{icon:'fa-solid fa-gamepad',lbl:'Unity Editor'},{icon:'fa-solid fa-map',lbl:'Level Design'},{icon:'fa-solid fa-robot',lbl:'Enemy AI'},{icon:'fa-solid fa-earth-americas',lbl:'Proc Gen'},{icon:'fa-solid fa-wand-magic-sparkles',lbl:'Shader Art'},{icon:'fa-solid fa-bullseye',lbl:'Game Jam'}],images:[]},

    {id:'drawing',title:'Digital Art',icon:'fa-solid fa-pencil',meta:'Illustration · Character Design',rating:4,genre:'Visual Art',badges:['Therapeutic','Creative'],
     feel:`Drawing is how I decompress when code has been messy all day. There's no compiler error in art — just choices. I started learning digital illustration to make better UI mockups and it became its own thing. Character design is fascinating because you're communicating personality entirely through visual shorthand. It's made me a significantly better UI designer — you develop a feel for visual weight and composition that transfers directly.`,
     moments:[{t:'First character sheet',d:'Realizing I could design a full character with the same logic as a UI.'},{t:'Color theory click moment',d:'Complementary colors and mood. Changed everything about my UI design.'},{t:'First environment sketch',d:'First time I drew a space that felt like somewhere real.'},{t:'Fanart completed',d:'Peak personal achievement. Still my favorite thing I\'ve made.'}],
     gallery:[{icon:'fa-solid fa-pencil',lbl:'Linework'},{icon:'fa-solid fa-palette',lbl:'Colors'},{icon:'fa-solid fa-user',lbl:'Character'},{icon:'fa-solid fa-city',lbl:'Environment'},{icon:'fa-solid fa-lightbulb',lbl:'Concept'},{icon:'fa-solid fa-mobile-screen',lbl:'UI Sketches'}],images:[]},
  ],
};

// ── STATE ─────────────────────────────────────────────────
let activeCat='anime', prevCat='anime';

// ── BUILD ─────────────────────────────────────────────────
function buildCatTabs(){
  const bar=document.getElementById('cat-tabs');
  bar.innerHTML=Object.entries(CATS).map(([key,c])=>{
    const items=[...DATA[key],...(LS.get('interests_'+key,[]))];
    return `<button class="cat-tab ${key===activeCat?'active':''}" onclick="switchCat('${key}',this)">
      <i class="${c.icon}"></i>${c.label}<span class="cat-count">${items.length}</span>
    </button>`;
  }).join('');
}

function buildGrids(){
  Object.entries(DATA).forEach(([key,items])=>{
    const ls=LS.get('interests_'+key,[]);
    const all=[...items,...ls];
    const grid=document.getElementById('grid-'+key);
    if(!grid) return;
    grid.innerHTML=all.map(item=>`
      <div class="title-card reveal" onclick="openDetail('${key}','${item.id}')">
        <div class="tc-thumb">
          <div class="tc-thumb-bg"></div>
          <div class="tc-thumb-glow"></div>
          <div class="tc-icon"><i class="${item.icon||'fa-solid fa-star'}"></i></div>
          ${item.badges?.[0]?`<div class="tc-badge"><i class="fa-solid fa-tag"></i>${item.badges[0]}</div>`:''}
        </div>
        <div class="tc-body">
          <div class="tc-title">${item.title}</div>
          <div class="tc-meta">${item.meta||''}</div>
        </div>
      </div>
    `).join('');
  });
}

function switchCat(key, btn){
  activeCat=key;
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else document.querySelectorAll('.cat-tab')[Object.keys(CATS).indexOf(key)]?.classList.add('active');
  document.querySelectorAll('.cat-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+key)?.classList.add('active');
  setTimeout(initReveal,50);
}

function openDetail(catKey,itemId){
  prevCat=catKey;
  const ls=LS.get('interests_'+catKey,[]);
  const item=[...(DATA[catKey]||[]),...ls].find(i=>i.id===itemId);
  if(!item) return;

  // breadcrumb
  document.getElementById('det-breadcrumb').innerHTML=`
    <a href="interests.html"><i class="fa-solid fa-house"></i>Interests</a>
    <span class="sep"><i class="fa-solid fa-chevron-right" style="font-size:.55rem"></i></span>
    <a href="#" onclick="goBack();return false;"><i class="${CATS[catKey]?.icon||'fa-solid fa-star'}"></i>${CATS[catKey]?.label}</a>
    <span class="sep"><i class="fa-solid fa-chevron-right" style="font-size:.55rem"></i></span>
    <span class="curr">${item.title}</span>
  `;

  const imgs=item.images||[];
  const stars='★'.repeat(item.rating||5)+'☆'.repeat(5-(item.rating||5));
  const starHTML=[...stars].map((s,i)=>`<i class="fa-solid fa-star ${i<(item.rating||5)?'star-full':'star-empty'}"></i>`).join('');

  document.getElementById('det-content').innerHTML=`
    <div class="detail-layout">
      <div>
        <div class="detail-cover">
          <div class="detail-cover-bg"></div>
          <div class="detail-cover-icon"><i class="${item.icon||'fa-solid fa-star'}"></i></div>
          <div class="detail-cover-glow"></div>
        </div>
        ${imgs.length?`<div class="detail-cover-imgs">
          ${imgs.map(url=>`<div class="detail-cover-img" onclick="openLB('${url}')"><img src="${url}" alt="${item.title}" loading="lazy"></div>`).join('')}
        </div>`:''}
      </div>
      <div>
        <h2 class="detail-title"><span class="grad">${item.title}</span></h2>
        <div class="detail-meta-row">
          <span class="meta-item"><i class="fa-solid fa-calendar"></i>${item.meta||''}</span>
          <span class="meta-sep">·</span>
          <span class="meta-item"><i class="fa-solid fa-tag"></i>${item.genre||''}</span>
          <span class="meta-sep">·</span>
          <span class="stars">${starHTML}</span>
        </div>
        <div class="detail-pills">${(item.badges||[]).map(b=>`<span class="pill"><i class="fa-solid fa-circle-dot" style="font-size:.55rem"></i>${b}</span>`).join('')}</div>

        <div class="feel-box">
          <div class="feel-label"><i class="fa-solid fa-heart-pulse"></i>my feel reading / watching this</div>
          <p class="feel-text"><span class="feel-qmark">"</span>${item.feel||'No description yet.'}</p>
        </div>

        ${item.moments?.length?`<div class="moments-wrap">
          <div class="moments-title"><i class="fa-solid fa-list-check"></i>standout moments</div>
          ${item.moments.map((m,i)=>`
            <div class="moment-row">
              <div class="moment-num">0${i+1}</div>
              <div class="moment-txt"><strong>${m.t}</strong> — ${m.d}</div>
            </div>
          `).join('')}
        </div>`:''}
      </div>
    </div>

    ${item.gallery?.length?`<div class="gallery-wrap">
      <div class="gallery-label"><i class="fa-solid fa-images"></i>gallery & vibes</div>
      <div class="gallery-imgs-grid">
        ${item.gallery.map(g=>`
          <div class="gallery-cell">
            <i class="${g.icon||'fa-solid fa-star'}"></i>
            <div class="gallery-cell-lbl">${g.lbl||''}</div>
          </div>
        `).join('')}
        ${imgs.map(url=>`<div class="gallery-cell" onclick="openLB('${url}')"><img src="${url}" alt=""><div class="gallery-cell-lbl">Photo</div></div>`).join('')}
      </div>
    </div>`:''}
  `;

  document.getElementById('cat-view').style.display='none';
  document.getElementById('detail-view').classList.add('open');
  scrollTo({top:0,behavior:'smooth'});
}

function goBack(){
  document.getElementById('cat-view').style.display='block';
  document.getElementById('detail-view').classList.remove('open');
  switchCat(prevCat);
  scrollTo({top:0,behavior:'smooth'});
}

function openLB(url){
  document.getElementById('lb-img').src=url;
  document.getElementById('lb').classList.add('open');
}
document.getElementById('lb').addEventListener('click',e=>{ if(e.target===e.currentTarget) e.currentTarget.classList.remove('open'); });

// ── INIT ─────────────────────────────────────────────────
buildCatTabs();
buildGrids();
switchCat('anime');
</script>
</body>
</html>
